    <path d="M352 260 L356 272 L368 276 L356 280 L352 292 L348 280 L336 276 L348 272 Z" fill="#ffffff" opacity="0.8" />
    
    <!-- Indian Rupee Symbol inside -->
    <path d="M226 216 L286 216 L286 236 L254.2 236 C264 240 274.5 248.5 276 261.5 L286 261.5 L286 281.5 L274.5 281.5 C270 297 258 305 241.5 305 L226 305 L226 285 L240.5 285 C249 285 255.5 279 255.5 268.5 L255.5 261.5 L226 261.5 L226 241.5 L254 241.5 L254 236 L226 236 Z" fill="#ffffff" />
